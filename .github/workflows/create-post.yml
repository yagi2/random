name: Create Post from Issue

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: write

jobs:
  create-post:
    # post ラベル付き && completed として close されたときだけ実行
    if: >-
      contains(github.event.issue.labels.*.name, 'post') &&
      github.event.issue.state_reason == 'completed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          # この workflow は記事ファイル生成のみで pnpm を使わない。
          # デフォルト true だと package.json の packageManager フィールド
          # ("pnpm@x.y.z") を見て pnpm を探しに行き、未インストールで失敗する。
          package-manager-cache: false

      - name: Parse issue body
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/new-post.yml

      - name: Build post file
        id: build
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          POST_DATE: ${{ steps.parse.outputs.issueparser_date }}
          POST_TAGS: ${{ steps.parse.outputs.issueparser_tags }}
          POST_AUTHOR: ${{ steps.parse.outputs.issueparser_author }}
          POST_BODY: ${{ steps.parse.outputs.issueparser_body }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const title = process.env.ISSUE_TITLE || '';
          const date = (process.env.POST_DATE || '').trim();
          const tagsRaw = (process.env.POST_TAGS || 'diary').trim();
          const author = (process.env.POST_AUTHOR || 'yagi2').trim();
          const body = process.env.POST_BODY || '';

          // date のバリデーション（YYYY-MM-DD）
          if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
            console.error(`Invalid date format: "${date}" (expected YYYY-MM-DD)`);
            process.exit(1);
          }

          // tags: "diary, nextjs" -> '["diary", "nextjs"]'
          // 各要素を quote する。Nextra/MDX の YAML parser は unquoted な
          // inline array の要素を期待通り string として扱わないことがある
          // (例: tags: [diary] が undefined になる) ため明示的に quote する。
          const tagList = tagsRaw
            .split(',')
            .map((t) => t.trim())
            .filter(Boolean);
          const tagsYaml = `[${tagList
            .map((t) => `"${t.replace(/"/g, '\\"')}"`)
            .join(', ')}]`;

          // YAML 文字列のエスケープ（: や # を含む場合のため二重引用符でくくる）
          const yamlEscape = (s) =>
            `"${String(s).replace(/\\/g, '\\\\').replace(/"/g, '\\"')}"`;

          const frontmatter = [
            '---',
            `title: ${yamlEscape(title)}`,
            `date: ${date}`,
            `tags: ${tagsYaml}`,
            `author: ${author}`,
            '---',
            '',
          ].join('\n');

          // 本文の改行を LF に統一し末尾を整える
          const normalizedBody =
            body.replace(/\r\n/g, '\n').replace(/\s+$/, '') + '\n';

          const content = frontmatter + '\n' + normalizedBody;

          const dir = path.join('app', '(post)', date);
          fs.mkdirSync(dir, { recursive: true });
          const filePath = path.join(dir, 'page.mdx');
          fs.writeFileSync(filePath, content, 'utf8');

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `file_path=${filePath}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `post_date=${date}\n`);

          console.log(`Wrote ${filePath}`);
          EOF

      - name: Commit and push to main
        id: commit
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          FILE_PATH: ${{ steps.build.outputs.file_path }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$FILE_PATH"
          # printf の format は固定、untrusted な ISSUE_TITLE は引数として渡し
          # shell quoting injection を回避する。stdin 経由で git commit に渡す。
          printf 'post: %s (#%s)\n' "$ISSUE_TITLE" "$ISSUE_NUMBER" | git commit -F -
          git push origin main
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Comment on issue
        uses: actions/github-script@v8
        env:
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
        with:
          script: |
            const sha = process.env.COMMIT_SHA;
            const shortSha = sha.slice(0, 7);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Published to \`main\`: ${context.repo.owner}/${context.repo.repo}@${shortSha}`
            });
